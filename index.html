<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Registro de gimnasio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b1d21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Registro">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1d21;
    --surface:#24272c;
    --surface-2:#2c3036;
    --text:#ece9e4;
    --text-muted:#8d939b;
    --accent:#ff6a39;
    --good:#57c785;
    --border:#33373d;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:contain;
  }
  
  /* Ocultar flechas en inputs numéricos */
  input[type=number]::-webkit-inner-spin-button, 
  input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; 
    margin: 0; 
  }
  input[type=number] {
    -moz-appearance: textfield;
  }

  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
    padding-top:env(safe-area-inset-top);
  }
  header{
    padding:22px 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .header-title {
    display:flex;
    align-items:center;
    gap:10px;
  }
  header svg{ flex-shrink:0; }
  header h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin:0;
  }
  header .sub{
    font-size:12px;
    color:var(--text-muted);
    margin-top:2px;
    letter-spacing:0.02em;
  }
  .btn-restart {
    background: var(--surface-2);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-restart:hover { background: var(--border); }
  .tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:4px 18px 12px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--text-muted);
    background:var(--surface);
    border:1px solid var(--border);
    padding:9px 16px;
    border-radius:999px;
    cursor:pointer;
    position:relative;
    transition:color .15s, border-color .15s, background .15s;
    white-space:nowrap;
  }
  .tab.active{
    color:var(--bg);
    background:var(--accent);
    border-color:var(--accent);
  }
  .tab.add-tab{
    color:var(--accent);
    background:transparent;
    border:1px dashed var(--border);
    font-size:16px;
    padding:9px 14px;
    justify-content: center;
  }
  .tab-del {
    color: var(--bg);
    font-size: 14px;
    font-weight: bold;
    opacity: 0.7;
    transition: opacity .15s;
  }
  .tab-del:hover { opacity: 1; }
  main{
    flex:1;
    padding:6px 18px 0;
  }
  .empty{
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
    padding:60px 20px;
    line-height:1.6;
  }
  .row{
    display:flex;
    align-items:center;
    gap:6px; 
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 8px;
    margin-bottom:8px;
  }
  .row.checked{
    border-color:var(--good);
    background:linear-gradient(0deg, rgba(87,199,133,.08), rgba(87,199,133,.08)), var(--surface);
  }
  .check{
    width:24px;
    height:24px;
    border-radius:50%;
    border:2px solid var(--text-muted);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:transparent;
    font-size:14px;
    transition:all .15s;
  }
  .row.checked .check{
    border-color:var(--good);
    background:var(--good);
    color:var(--bg);
  }
  .ex-name{
    flex:1;
    font-size:14px;
    font-weight:500;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    outline:none;
    min-width:50px; 
    padding:4px 2px;
  }
  .row.checked .ex-name{
    color:var(--text-muted);
    text-decoration:line-through;
    text-decoration-color:var(--good);
  }
  
  /* Nuevo estilo para Sets x Reps */
  .sets-reps-wrap {
    display:flex;
    align-items:center;
    gap:2px;
    background:var(--surface-2);
    border-radius:6px;
    padding:5px 4px;
    flex-shrink:0;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }
  .sets-reps-input {
    width:24px;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:600;
    text-align:center;
    outline:none;
    padding: 0;
  }
  .sets-reps-input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 12px; }

  .weight-wrap{
    display:flex;
    align-items:baseline;
    gap:2px;
    background:var(--surface-2);
    border-radius:6px;
    padding:5px 6px;
    flex-shrink:0;
  }
  .weight-input{
    width:50px; 
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:600;
    text-align:right;
    outline:none;
  }
  .weight-unit{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
  }
  .up-weight-check{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0 2px;
  }
  .up-weight-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--text-muted);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    color: transparent;
    transition: all .15s;
  }
  .up-weight-check.active .up-weight-box {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--bg);
  }
  .up-weight-label {
    font-size: 8px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .up-weight-check.active .up-weight-label {
    color: var(--accent);
    font-weight: 600;
  }
  .order-btns {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .order-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 10px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
  }
  .order-btn:hover { color: var(--accent); }
  .del{
    background:transparent;
    border:none;
    color:var(--text-muted);
    font-size:15px;
    cursor:pointer;
    padding:4px 2px;
    flex-shrink:0;
    line-height:1;
  }
  .del:hover{ color:var(--accent); }
  .add-ex-btn{
    width:100%;
    background:transparent;
    border:1px dashed var(--border);
    color:var(--accent);
    border-radius:var(--radius);
    padding:12px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:13px;
    cursor:pointer;
    margin-top:4px;
    margin-bottom:8px;
  }
  .inline-form{
    display:flex;
    gap:6px;
    background:var(--surface);
    border:1px solid var(--accent);
    border-radius:var(--radius);
    padding:10px;
    margin-bottom:8px;
    flex-wrap: wrap; 
  }
  .inline-form input[type=text]{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    outline:none;
    min-width:100px;
  }
  .inline-form-group {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 6px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .inline-form-group input[type=number]{
    width:32px;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    text-align:center;
    outline:none;
    padding: 8px 0;
  }
  .inline-form > input[type=number]{
    width:65px; 
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px 6px;
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    text-align:center;
    outline:none;
  }
  .inline-form button{
    border:none;
    border-radius:6px;
    padding:0 12px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .btn-ok{ background:var(--accent); color:var(--bg); flex-grow: 1; padding: 8px 0 !important; }
  .btn-cancel{ background:var(--surface-2); color:var(--text-muted); }
  
  .io-section {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
    margin-top: 20px;
  }
  .btn-io {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-io:hover { border-color: var(--text-muted); color: var(--text); }
  
  .footer-note{
    text-align:center;
    color:var(--text-muted);
    font-size:11px;
    letter-spacing:0.03em;
    padding:0 20px 20px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-title">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <rect x="2" y="12" width="4" height="6" rx="1" fill="#ff6a39"/>
        <rect x="24" y="12" width="4" height="6" rx="1" fill="#ff6a39"/>
        <rect x="7" y="9" width="3" height="12" rx="1" fill="#ece9e4"/>
        <rect x="20" y="9" width="3" height="12" rx="1" fill="#ece9e4"/>
        <rect x="9" y="14" width="12" height="2" fill="#ece9e4"/>
      </svg>
      <div>
        <h1>Registro</h1>
        <div class="sub">Tu progreso, por grupo muscular</div>
      </div>
    </div>
    <button id="btn-restart" class="btn-restart">Reiniciar</button>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
  
  <div class="io-section">
    <button class="btn-io" id="btn-export">Exportar Datos</button>
    <button class="btn-io" id="btn-import" onclick="document.getElementById('file-import').click()">Importar Datos</button>
    <input type="file" id="file-import" accept=".json" style="display: none;">
  </div>
  
  <div class="footer-note">Los datos se guardan solo en este dispositivo.</div>
</div>

<script>
const STORAGE_KEY = 'gymlog-data';
const DEFAULT_CATEGORIES = ['Pierna','Espalda','Pecho','Hombro','Brazo','Core'];

let state = null;
let activeCategory = null;
let addingCategory = false;
let addingExerciseFor = null;

function uid(){ return Math.random().toString(36).slice(2,9); }

function defaultState(){
  return {
    categories: DEFAULT_CATEGORIES.map(name => ({ id: uid(), name, exercises: [] }))
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
  }catch(e){
    state = defaultState();
  }
  activeCategory = state.categories[0] ? state.categories[0].id : null;
  render();
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('No se pudo guardar', e);
  }
}

function getCategory(id){
  return state.categories.find(c => c.id === id);
}

function render(){
  renderTabs();
  renderMain();
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  state.categories.forEach(cat => {
    const btn = document.createElement('div');
    btn.className = 'tab' + (cat.id === activeCategory ? ' active' : '');
    
    const nameSpan = document.createElement('span');
    nameSpan.textContent = cat.name;
    btn.appendChild(nameSpan);

    if(cat.id === activeCategory) {
      const delCatBtn = document.createElement('div');
      delCatBtn.className = 'tab-del';
      delCatBtn.textContent = '✕';
      delCatBtn.onclick = (e) => {
        e.stopPropagation();
        if(confirm(`¿Estás seguro de eliminar el grupo "${cat.name}" y todos sus ejercicios?`)){
          state.categories = state.categories.filter(c => c.id !== cat.id);
          activeCategory = state.categories[0] ? state.categories[0].id : null;
          saveState();
          render();
        }
      };
      btn.appendChild(delCatBtn);
    }

    btn.onclick = () => { activeCategory = cat.id; addingExerciseFor = null; render(); };
    tabs.appendChild(btn);
  });

  if(addingCategory){
    const form = document.createElement('form');
    form.style.display = 'flex';
    form.style.gap = '6px';
    form.style.flexShrink = '0';
    form.innerHTML = `
      <input type="text" id="new-cat-input" placeholder="Nombre" maxlength="20"
        style="width:110px;background:var(--surface-2);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;outline:none;">
    `;
    tabs.appendChild(form);
    const input = form.querySelector('#new-cat-input');
    setTimeout(() => input.focus(), 0);
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); confirmAddCategory(input.value); }
      if(e.key === 'Escape'){ addingCategory = false; render(); }
    });
    input.addEventListener('blur', () => confirmAddCategory(input.value));
  } else {
    const addBtn = document.createElement('div');
    addBtn.className = 'tab add-tab';
    addBtn.textContent = '+';
    addBtn.onclick = () => { addingCategory = true; render(); };
    tabs.appendChild(addBtn);
  }
}

function confirmAddCategory(name){
  addingCategory = false;
  const trimmed = (name || '').trim();
  if(trimmed){
    const cat = { id: uid(), name: trimmed, exercises: [] };
    state.categories.push(cat);
    activeCategory = cat.id;
    saveState();
  }
  render();
}

function renderMain(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const cat = getCategory(activeCategory);
  if(!cat){
    main.innerHTML = '<div class="empty">Crea un grupo muscular con el botón + de arriba.</div>';
    return;
  }

  if(cat.exercises.length === 0 && addingExerciseFor !== cat.id){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Aún no has añadido ejercicios de ' + cat.name.toLowerCase() + '.';
    main.appendChild(empty);
  } else {
    cat.exercises.forEach((ex, index) => {
      main.appendChild(renderExerciseRow(cat, ex, index));
    });
  }

  if(addingExerciseFor === cat.id){
    main.appendChild(renderAddExerciseForm(cat));
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-ex-btn';
    addBtn.textContent = '+ Añadir ejercicio';
    addBtn.onclick = () => { addingExerciseFor = cat.id; render(); };
    main.appendChild(addBtn);
  }
}

function renderExerciseRow(cat, ex, index){
  const row = document.createElement('div');
  row.className = 'row' + (ex.checked ? ' checked' : '');

  // Checkbox
  const check = document.createElement('div');
  check.className = 'check';
  check.textContent = '✓';
  check.onclick = () => {
    ex.checked = !ex.checked;
    saveState();
    render();
  };
  row.appendChild(check);

  // Nombre
  const nameInput = document.createElement('input');
  nameInput.className = 'ex-name';
  nameInput.type = 'text';
  nameInput.value = ex.name;
  nameInput.addEventListener('change', () => {
    ex.name = nameInput.value.trim() || ex.name;
    saveState();
  });
  row.appendChild(nameInput);

  // --- Lógica de migración si venías de "3x12" a variables separadas ---
  let initSets = ex.sets !== undefined ? ex.sets : '';
  let initReps = ex.repsCount !== undefined ? ex.repsCount : '';
  
  if (typeof ex.reps === 'string') {
    if (ex.reps.includes('x')) {
      const parts = ex.reps.split('x');
      initSets = parts[0].trim();
      initReps = parts[1].trim();
    }
    delete ex.reps; // Borramos la antigua
    ex.sets = initSets;
    ex.repsCount = initReps;
    saveState(); // Guardamos el formato nuevo
  }

  // --- Nuevos campos numéricos para Sets y Reps ---
  const setsRepsWrap = document.createElement('div');
  setsRepsWrap.className = 'sets-reps-wrap';
  
  const setsInput = document.createElement('input');
  setsInput.className = 'sets-reps-input';
  setsInput.type = 'number';
  setsInput.min = '0';
  setsInput.placeholder = '3';
  setsInput.value = initSets;
  setsInput.addEventListener('change', () => {
    ex.sets = parseInt(setsInput.value) || '';
    saveState();
  });

  const separator = document.createElement('span');
  separator.textContent = 'x';

  const repsInput = document.createElement('input');
  repsInput.className = 'sets-reps-input';
  repsInput.type = 'number';
  repsInput.min = '0';
  repsInput.placeholder = '12';
  repsInput.value = initReps;
  repsInput.addEventListener('change', () => {
    ex.repsCount = parseInt(repsInput.value) || '';
    saveState();
  });

  setsRepsWrap.appendChild(setsInput);
  setsRepsWrap.appendChild(separator);
  setsRepsWrap.appendChild(repsInput);
  row.appendChild(setsRepsWrap);

  // Peso
  const weightWrap = document.createElement('div');
  weightWrap.className = 'weight-wrap';
  const weightInput = document.createElement('input');
  weightInput.className = 'weight-input';
  weightInput.type = 'number';
  weightInput.step = '0.5';
  weightInput.min = '0';
  weightInput.value = ex.weight;
  weightInput.addEventListener('change', () => {
    const v = parseFloat(weightInput.value);
    ex.weight = isNaN(v) ? 0 : v;
    saveState();
  });
  weightWrap.appendChild(weightInput);
  const unit = document.createElement('span');
  unit.className = 'weight-unit';
  unit.textContent = 'kg';
  weightWrap.appendChild(unit);
  row.appendChild(weightWrap);

  // Check de "Subir peso"
  const upWeightCheck = document.createElement('div');
  upWeightCheck.className = 'up-weight-check' + (ex.upWeight ? ' active' : '');
  const upWeightBox = document.createElement('div');
  upWeightBox.className = 'up-weight-box';
  upWeightBox.textContent = '↑';
  const upWeightLabel = document.createElement('span');
  upWeightLabel.className = 'up-weight-label';
  upWeightLabel.textContent = 'Subir';
  upWeightCheck.appendChild(upWeightBox);
  upWeightCheck.appendChild(upWeightLabel);
  upWeightCheck.onclick = () => {
    ex.upWeight = !ex.upWeight;
    saveState();
    render();
  };
  row.appendChild(upWeightCheck);

  // Botones de orden (Subir/Bajar)
  const orderBtns = document.createElement('div');
  orderBtns.className = 'order-btns';
  
  const btnUp = document.createElement('button');
  btnUp.className = 'order-btn';
  btnUp.innerHTML = '▲';
  btnUp.style.visibility = index === 0 ? 'hidden' : 'visible';
  btnUp.onclick = () => {
    if(index > 0){
      const temp = cat.exercises[index - 1];
      cat.exercises[index - 1] = cat.exercises[index];
      cat.exercises[index] = temp;
      saveState(); render();
    }
  };
  
  const btnDown = document.createElement('button');
  btnDown.className = 'order-btn';
  btnDown.innerHTML = '▼';
  btnDown.style.visibility = index === cat.exercises.length - 1 ? 'hidden' : 'visible';
  btnDown.onclick = () => {
    if(index < cat.exercises.length - 1){
      const temp = cat.exercises[index + 1];
      cat.exercises[index + 1] = cat.exercises[index];
      cat.exercises[index] = temp;
      saveState(); render();
    }
  };
  
  orderBtns.appendChild(btnUp);
  orderBtns.appendChild(btnDown);
  row.appendChild(orderBtns);

  // Borrar
  const del = document.createElement('button');
  del.className = 'del';
  del.textContent = '✕';
  del.onclick = () => {
    cat.exercises = cat.exercises.filter(e => e.id !== ex.id);
    saveState();
    render();
  };
  row.appendChild(del);

  return row;
}

function renderAddExerciseForm(cat){
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input type="text" id="new-ex-name" placeholder="Ejercicio" maxlength="40">
    <div class="inline-form-group">
      <input type="number" id="new-ex-sets" placeholder="3" min="0">
      <span>x</span>
      <input type="number" id="new-ex-reps" placeholder="12" min="0">
    </div>
    <input type="number" id="new-ex-weight" placeholder="kg" step="0.5" min="0">
    <div style="width: 100%; display: flex; gap: 8px; margin-top: 4px;">
      <button class="btn-cancel" type="button" style="padding: 8px 16px;">✕</button>
      <button class="btn-ok" type="button">Guardar</button>
    </div>
  `;
  const nameInput = form.querySelector('#new-ex-name');
  const setsInput = form.querySelector('#new-ex-sets');
  const repsInput = form.querySelector('#new-ex-reps');
  const weightInput = form.querySelector('#new-ex-weight');
  const okBtn = form.querySelector('.btn-ok');
  const cancelBtn = form.querySelector('.btn-cancel');

  function confirmAdd(){
    const name = nameInput.value.trim();
    if(!name){ addingExerciseFor = null; render(); return; }
    
    const sets = parseInt(setsInput.value) || '';
    const repsCount = parseInt(repsInput.value) || '';
    const weight = parseFloat(weightInput.value) || 0;
    
    cat.exercises.push({ id: uid(), name, weight, sets, repsCount, checked: false, upWeight: false });
    addingExerciseFor = null;
    saveState();
    render();
  }

  okBtn.onclick = confirmAdd;
  cancelBtn.onclick = () => { addingExerciseFor = null; render(); };
  nameInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); confirmAdd(); } });
  setsInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); confirmAdd(); } });
  repsInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); confirmAdd(); } });
  weightInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); confirmAdd(); } });

  setTimeout(() => nameInput.focus(), 0);
  return form;
}

// Botón de reiniciar global
document.getElementById('btn-restart').addEventListener('click', () => {
  if (confirm('¿Estás seguro de que quieres desmarcar todos los ejercicios completados de todos los grupos?')) {
    state.categories.forEach(cat => {
      cat.exercises.forEach(ex => {
        ex.checked = false;
      });
    });
    saveState();
    render();
  }
});

// Exportar datos
document.getElementById('btn-export').addEventListener('click', () => {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href", dataStr);
  
  const date = new Date().toISOString().split('T')[0];
  downloadAnchorNode.setAttribute("download", `gimnasio_backup_${date}.json`);
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
});

// Importar datos
document.getElementById('file-import').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedState = JSON.parse(e.target.result);
      if (importedState && importedState.categories) {
        state = importedState;
        saveState();
        activeCategory = state.categories[0] ? state.categories[0].id : null;
        render();
        alert('Datos importados correctamente.');
      } else {
        alert('El archivo no tiene el formato correcto.');
      }
    } catch (error) {
      alert('Error al leer el archivo. Asegúrate de que sea un JSON válido.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
});

loadState();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(err => {
      console.error('Service worker no registrado:', err);
    });
  });
}
