<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Registro de gimnasio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b1d21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Registro">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1d21;
    --surface:#24272c;
    --surface-2:#2c3036;
    --text:#ece9e4;
    --text-muted:#8d939b;
    --accent:#ff6a39;
    --good:#57c785;
    --border:#33373d;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:contain;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
    padding-top:env(safe-area-inset-top);
  }
  header{
    padding:22px 18px 14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  header svg{ flex-shrink:0; }
  header h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin:0;
  }
  header .sub{
    font-size:12px;
    color:var(--text-muted);
    margin-top:2px;
    letter-spacing:0.02em;
  }
  .tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:4px 18px 12px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--text-muted);
    background:var(--surface);
    border:1px solid var(--border);
    padding:9px 16px;
    border-radius:999px;
    cursor:pointer;
    position:relative;
    transition:color .15s, border-color .15s, background .15s;
    white-space:nowrap;
  }
  .tab.active{
    color:var(--bg);
    background:var(--accent);
    border-color:var(--accent);
  }
  .tab.add-tab{
    color:var(--accent);
    background:transparent;
    border:1px dashed var(--border);
    font-size:16px;
    padding:9px 14px;
  }
  main{
    flex:1;
    padding:6px 18px 0;
  }
  .empty{
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
    padding:60px 20px;
    line-height:1.6;
  }
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 10px;
    margin-bottom:8px;
  }
  .row.checked{
    border-color:var(--good);
    background:linear-gradient(0deg, rgba(87,199,133,.08), rgba(87,199,133,.08)), var(--surface);
  }
  .check{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid var(--text-muted);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:transparent;
    font-size:14px;
    transition:all .15s;
  }
  .row.checked .check{
    border-color:var(--good);
    background:var(--good);
    color:var(--bg);
  }
  .ex-name{
    flex:1;
    font-size:15px;
    font-weight:500;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    outline:none;
    min-width:0;
    padding:4px 2px;
  }
  .row.checked .ex-name{
    color:var(--text-muted);
    text-decoration:line-through;
    text-decoration-color:var(--good);
  }
  .weight-wrap{
    display:flex;
    align-items:baseline;
    gap:3px;
    background:var(--surface-2);
    border-radius:6px;
    padding:5px 8px;
    flex-shrink:0;
  }
  .weight-input{
    width:44px;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:600;
    text-align:right;
    outline:none;
  }
  .weight-unit{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
  }
  .del{
    background:transparent;
    border:none;
    color:var(--text-muted);
    font-size:16px;
    cursor:pointer;
    padding:4px 2px;
    flex-shrink:0;
    line-height:1;
  }
  .del:hover{ color:var(--accent); }
  .add-ex-btn{
    width:100%;
    background:transparent;
    border:1px dashed var(--border);
    color:var(--accent);
    border-radius:var(--radius);
    padding:12px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:13px;
    cursor:pointer;
    margin-top:4px;
    margin-bottom:8px;
  }
  .inline-form{
    display:flex;
    gap:8px;
    background:var(--surface);
    border:1px solid var(--accent);
    border-radius:var(--radius);
    padding:10px;
    margin-bottom:8px;
  }
  .inline-form input[type=text]{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px 10px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    outline:none;
    min-width:0;
  }
  .inline-form input[type=number]{
    width:56px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px 6px;
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    text-align:center;
    outline:none;
  }
  .inline-form button{
    border:none;
    border-radius:6px;
    padding:0 12px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .btn-ok{ background:var(--accent); color:var(--bg); }
  .btn-cancel{ background:var(--surface-2); color:var(--text-muted); }
  .footer-note{
    text-align:center;
    color:var(--text-muted);
    font-size:11px;
    letter-spacing:0.03em;
    padding:20px 20px 4px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <rect x="2" y="12" width="4" height="6" rx="1" fill="#ff6a39"/>
      <rect x="24" y="12" width="4" height="6" rx="1" fill="#ff6a39"/>
      <rect x="7" y="9" width="3" height="12" rx="1" fill="#ece9e4"/>
      <rect x="20" y="9" width="3" height="12" rx="1" fill="#ece9e4"/>
      <rect x="9" y="14" width="12" height="2" fill="#ece9e4"/>
    </svg>
    <div>
      <h1>Registro</h1>
      <div class="sub">Tu progreso, por grupo muscular</div>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
  <div class="footer-note">Los datos se guardan solo en este dispositivo.</div>
</div>

<script>
const STORAGE_KEY = 'gymlog-data';
const DEFAULT_CATEGORIES = ['Pierna','Espalda','Pecho','Hombro','Brazo','Core'];

let state = null;
let activeCategory = null;
let addingCategory = false;
let addingExerciseFor = null;

function uid(){ return Math.random().toString(36).slice(2,9); }

function defaultState(){
  return {
    categories: DEFAULT_CATEGORIES.map(name => ({ id: uid(), name, exercises: [] }))
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : defaultState();
  }catch(e){
    state = defaultState();
  }
  activeCategory = state.categories[0] ? state.categories[0].id : null;
  render();
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('No se pudo guardar', e);
  }
}

function getCategory(id){
  return state.categories.find(c => c.id === id);
}

function render(){
  renderTabs();
  renderMain();
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  state.categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat.id === activeCategory ? ' active' : '');
    btn.textContent = cat.name;
    btn.onclick = () => { activeCategory = cat.id; addingExerciseFor = null; render(); };
    tabs.appendChild(btn);
  });

  if(addingCategory){
    const form = document.createElement('form');
    form.style.display = 'flex';
    form.style.gap = '6px';
    form.style.flexShrink = '0';
    form.innerHTML = `
      <input type="text" id="new-cat-input" placeholder="Nombre" maxlength="20"
        style="width:110px;background:var(--surface-2);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;outline:none;">
    `;
    tabs.appendChild(form);
    const input = form.querySelector('#new-cat-input');
    setTimeout(() => input.focus(), 0);
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); confirmAddCategory(input.value); }
      if(e.key === 'Escape'){ addingCategory = false; render(); }
    });
    input.addEventListener('blur', () => confirmAddCategory(input.value));
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'tab add-tab';
    addBtn.textContent = '+';
    addBtn.onclick = () => { addingCategory = true; render(); };
    tabs.appendChild(addBtn);
  }
}

function confirmAddCategory(name){
  addingCategory = false;
  const trimmed = (name || '').trim();
  if(trimmed){
    const cat = { id: uid(), name: trimmed, exercises: [] };
    state.categories.push(cat);
    activeCategory = cat.id;
    saveState();
  }
  render();
}

function renderMain(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const cat = getCategory(activeCategory);
  if(!cat){
    main.innerHTML = '<div class="empty">Crea un grupo muscular con el botón + de arriba.</div>';
    return;
  }

  if(cat.exercises.length === 0 && addingExerciseFor !== cat.id){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Aún no has añadido ejercicios de ' + cat.name.toLowerCase() + '.';
    main.appendChild(empty);
  } else {
    cat.exercises.forEach(ex => {
      main.appendChild(renderExerciseRow(cat, ex));
    });
  }

  if(addingExerciseFor === cat.id){
    main.appendChild(renderAddExerciseForm(cat));
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-ex-btn';
    addBtn.textContent = '+ Añadir ejercicio';
    addBtn.onclick = () => { addingExerciseFor = cat.id; render(); };
    main.appendChild(addBtn);
  }
}

function renderExerciseRow(cat, ex){
  const row = document.createElement('div');
  row.className = 'row' + (ex.checked ? ' checked' : '');

  const check = document.createElement('div');
  check.className = 'check';
  check.textContent = '✓';
  check.onclick = () => {
    ex.checked = !ex.checked;
    saveState();
    render();
  };
  row.appendChild(check);

  const nameInput = document.createElement('input');
  nameInput.className = 'ex-name';
  nameInput.type = 'text';
  nameInput.value = ex.name;
  nameInput.addEventListener('change', () => {
    ex.name = nameInput.value.trim() || ex.name;
    saveState();
  });
  row.appendChild(nameInput);

  const weightWrap = document.createElement('div');
  weightWrap.className = 'weight-wrap';
  const weightInput = document.createElement('input');
  weightInput.className = 'weight-input';
  weightInput.type = 'number';
  weightInput.step = '0.5';
  weightInput.min = '0';
  weightInput.value = ex.weight;
  weightInput.addEventListener('change', () => {
    const v = parseFloat(weightInput.value);
    ex.weight = isNaN(v) ? 0 : v;
    saveState();
  });
  weightWrap.appendChild(weightInput);
  const unit = document.createElement('span');
  unit.className = 'weight-unit';
  unit.textContent = 'kg';
  weightWrap.appendChild(unit);
  row.appendChild(weightWrap);

  const del = document.createElement('button');
  del.className = 'del';
  del.textContent = '✕';
  del.onclick = () => {
    cat.exercises = cat.exercises.filter(e => e.id !== ex.id);
    saveState();
    render();
  };
  row.appendChild(del);

  return row;
}

function renderAddExerciseForm(cat){
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input type="text" id="new-ex-name" placeholder="Nombre del ejercicio" maxlength="40">
    <input type="number" id="new-ex-weight" placeholder="kg" step="0.5" min="0">
    <button class="btn-ok" type="button">Añadir</button>
    <button class="btn-cancel" type="button">✕</button>
  `;
  const nameInput = form.querySelector('#new-ex-name');
  const weightInput = form.querySelector('#new-ex-weight');
  const okBtn = form.querySelector('.btn-ok');
  const cancelBtn = form.querySelector('.btn-cancel');

  function confirmAdd(){
    const name = nameInput.value.trim();
    if(!name){ addingExerciseFor = null; render(); return; }
    const weight = parseFloat(weightInput.value) || 0;
    cat.exercises.push({ id: uid(), name, weight, checked: false });
    addingExerciseFor = null;
    saveState();
    render();
  }

  okBtn.onclick = confirmAdd;
  cancelBtn.onclick = () => { addingExerciseFor = null; render(); };
  nameInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); confirmAdd(); } });
  weightInput.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); confirmAdd(); } });

  setTimeout(() => nameInput.focus(), 0);
  return form;
}

loadState();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(err => {
      console.error('Service worker no registrado:', err);
    });
  });
}
</script>
</body>
</html>
